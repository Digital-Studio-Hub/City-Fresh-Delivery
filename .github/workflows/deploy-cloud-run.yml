name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

env:
  SERVICE_NAME: city-fresh-delivery
  REGISTRY: gcr.io

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Cloud SDK
        id: gcp-config
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_ID="${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}"
          GAR_LOCATION="${{ secrets.GCP_REGION || vars.GCP_REGION }}"
          SERVICE_ACCOUNT_KEY="${{ secrets.GCP_SA_KEY }}"

          if [[ -z "${SERVICE_ACCOUNT_KEY}" ]]; then
            echo "Missing required secret: GCP_SA_KEY"
            exit 1
          fi

          CREDENTIALS_JSON="${SERVICE_ACCOUNT_KEY}"
          if ! echo "${CREDENTIALS_JSON}" | jq -e . >/dev/null 2>&1; then
            CREDENTIALS_JSON="$(echo "${SERVICE_ACCOUNT_KEY}" | base64 --decode)"
          fi

          if [[ -z "${PROJECT_ID}" ]]; then
            PROJECT_ID="$(echo "${CREDENTIALS_JSON}" | jq -r '.project_id // empty')"
          fi

          if [[ -z "${PROJECT_ID}" ]]; then
            echo "Missing required GCP project id. Set GCP_PROJECT_ID secret/variable or include project_id in GCP_SA_KEY."
            exit 1
          fi

          if [[ -z "${GAR_LOCATION}" ]]; then
            echo "Missing required region. Set GCP_REGION secret or variable."
            exit 1
          fi

          {
            echo "PROJECT_ID=${PROJECT_ID}"
            echo "GAR_LOCATION=${GAR_LOCATION}"
          } >> "${GITHUB_ENV}"

          {
            echo "project_id=${PROJECT_ID}"
            echo "credentials_json<<EOF"
            echo "${CREDENTIALS_JSON}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ steps.gcp-config.outputs.project_id }}
          credentials_json: ${{ steps.gcp-config.outputs.credentials_json }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.gcp-config.outputs.project_id }}

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            --tag "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest" \
            .

      - name: Push Docker image to Google Container Registry
        run: |
          docker push "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker push "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            --platform managed \
            --region ${{ env.GAR_LOCATION }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 3600 \
            --set-env-vars NODE_ENV=production,DISABLE_REUSE_PORT=true \
            --set-secrets INBOUND_API_KEY=INBOUND_API_KEY:latest

      - name: Get Cloud Run URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.GAR_LOCATION }} \
            --format 'value(status.url)')
          echo "Service deployed to: $URL"
          echo "DEPLOYMENT_URL=$URL" >> $GITHUB_OUTPUT
        id: deploy-output

      - name: Post deployment summary
        run: |
          echo "✅ Deployment successful!"
          echo "Service: ${{ env.SERVICE_NAME }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo "Region: ${{ env.GAR_LOCATION }}"
