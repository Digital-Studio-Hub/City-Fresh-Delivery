name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

env:
  SERVICE_NAME: city-fresh-delivery
  REGISTRY: gcr.io

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
      GAR_LOCATION: ${{ secrets.GCP_REGION || vars.GCP_REGION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${{ secrets.GCP_SA_KEY }}" ]] && missing+=("GCP_SA_KEY")
          [[ -z "${PROJECT_ID}" ]] && missing+=("GCP_PROJECT_ID (secret or variable)")
          [[ -z "${GAR_LOCATION}" ]] && missing+=("GCP_REGION (secret or variable)")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing required secrets/variables:"
            printf '  - %s\n' "${missing[@]}"
            echo ""
            echo "Set them in your repository under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            --tag "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest" \
            .

      - name: Push Docker image to Google Container Registry
        run: |
          docker push "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker push "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            --platform managed \
            --region ${{ env.GAR_LOCATION }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 3600 \
            --set-env-vars NODE_ENV=production,DISABLE_REUSE_PORT=true \
            --set-secrets INBOUND_API_KEY=INBOUND_API_KEY:latest

      - name: Get Cloud Run URL
        id: deploy-output
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.GAR_LOCATION }} \
            --format 'value(status.url)')
          echo "Service deployed to: $URL"
          echo "DEPLOYMENT_URL=$URL" >> $GITHUB_OUTPUT

      - name: Post deployment summary
        run: |
          echo "✅ Deployment successful!"
          echo "Service: ${{ env.SERVICE_NAME }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo "Region: ${{ env.GAR_LOCATION }}"
